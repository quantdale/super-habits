name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
# This prevents redundant runs when you push quick follow-up commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Cache node_modules keyed on the lockfile hash.
      # patch-package runs on postinstall, so this also caches patched modules.
      # Cache is invalidated automatically whenever package-lock.json changes.
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      # Only run npm ci (+ patch-package postinstall) on cache miss.
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start web server
        run: npm run web &
        env:
          EXPO_UNSTABLE_HEADLESS: 1

      # Use 127.0.0.1 (not localhost): on Ubuntu runners `localhost` may resolve to ::1
      # first while Metro binds IPv4 only, so wait-on would never connect.
      - name: Wait for web server
        run: npx wait-on http://127.0.0.1:8081 --timeout 120000

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: .cursor/playwright-output/e2e-report/
          retention-days: 7
